name: 🛠️ Building library

on:
  workflow_dispatch:
    inputs:
      force_nuget_publish:
        description: 'Force NuGet publish even if source files did not change'
        type: boolean
        default: false
  push:
    branches:
      - main
      - develop
    tags:
      - v*
  pull_request:
    branches:
      - main
      - develop


jobs:
  build:
    name: 🛠️ Build and test
    runs-on: ubuntu-latest

    steps:
      - name: 👨‍💻 Check-out code
        uses: actions/checkout@v5

      - name: 👨‍🔧 Setup .NET Core SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.x
            10.x

      - name: 🔍 Enable problem matchers
        run: echo "::add-matcher::.github/matchers/dotnet.json"

      - name: 🦸‍♂️ Restore steriods
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          # Look to see if there is a cache hit for the corresponding requirements file
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget

      - name: 🎒 Restore Tools
        run: dotnet tool restore

      - name: 🎒 Load packages
        run: dotnet restore
    
      - name: 🛠️ Build code
        run: |
          dotnet build ./src/Sonos.Base.Events.Http/Sonos.Base.Events.Http.csproj --configuration Release --no-restore 
          
      - name: 🫣 Testing code
        run: |
          echo "## 🧪 Test results" >> $GITHUB_STEP_SUMMARY
          dotnet test --configuration Release -v minimal --logger GitHubActions '/p:CollectCoverage=true;CoverletOutputFormat="json,lcov,cobertura";MergeWith=${{github.workspace}}/coverage.json;CoverletOutput=${{github.workspace}}/coverage' tests/Sonos.Base.Tests -- RunConfiguration.CollectSourceInformation=true
          dotnet test --configuration Release -v minimal --logger GitHubActions '/p:CollectCoverage=true;CoverletOutputFormat="json,lcov,cobertura";MergeWith=${{github.workspace}}/coverage.json;CoverletOutput=${{github.workspace}}/coverage' tests/Sonos.Base.Events.Http.Tests -- RunConfiguration.CollectSourceInformation=true
  
      - name: 📝 Code Coverage report
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool --version 5.5.4
          reportgenerator -reports:${{github.workspace}}/coverage.cobertura.xml -targetdir:${{github.workspace}}/report -reporttypes:MarkdownSummaryGithub "-filefilters:-*.g.cs;-*.gen.cs" -verbosity:Warning
          sed -i 's/# Summary/## 📝 Code Coverage/g' ${{github.workspace}}/report/SummaryGithub.md
          sed -i 's/## Coverage/### Code Coverage details/g' ${{github.workspace}}/report/SummaryGithub.md
          cat ${{github.workspace}}/report/*.md >> $GITHUB_STEP_SUMMARY
        env:
          REPORTGENERATOR_LICENSE: ${{ secrets.REPORTGENERATOR_LICENSE }}

  check-nuget-changes:
    name: 🔍 Check NuGet source changes
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    outputs:
      nuget_changed: ${{ steps.changes.outputs.nuget_changed }}
    steps:
      - name: 👨‍💻 Check-out code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 🔍 Detect changes since previous tag
        id: changes
        run: |
          PREVIOUS_TAG=$(git tag --sort=-v:refname | sed -n '2p')
          if [ -z "$PREVIOUS_TAG" ]; then
            echo "No previous tag found, assuming changes"
            echo "nuget_changed=true" >> $GITHUB_OUTPUT
            echo "## 📦 NuGet Source Changes" >> $GITHUB_STEP_SUMMARY
            echo "No previous tag found — assuming source has changed. **Will publish new NuGet packages.**" >> $GITHUB_STEP_SUMMARY
          else
            CHANGED=$(git diff --name-only "$PREVIOUS_TAG" HEAD -- src/Sonos.Base/ src/Sonos.Base.Events.Http/)
            if [ -z "$CHANGED" ]; then
              echo "No NuGet source changes detected between $PREVIOUS_TAG and ${{ github.ref_name }}"
              echo "nuget_changed=false" >> $GITHUB_OUTPUT
              echo "## ⏭️ No NuGet Source Changes" >> $GITHUB_STEP_SUMMARY
              echo "No changes detected in NuGet source files between \`$PREVIOUS_TAG\` and \`${{ github.ref_name }}\`. Skipping NuGet publish." >> $GITHUB_STEP_SUMMARY
            else
              echo "NuGet source changes detected:"
              echo "$CHANGED"
              echo "nuget_changed=true" >> $GITHUB_OUTPUT
              echo "## 📦 NuGet Source Changes Detected" >> $GITHUB_STEP_SUMMARY
              echo "Changes detected between \`$PREVIOUS_TAG\` and \`${{ github.ref_name }}\`. **Will publish new NuGet packages.**" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "### 🗂️ Changed files" >> $GITHUB_STEP_SUMMARY
              echo "$CHANGED" | while IFS= read -r file; do
                echo "- \`$file\`" >> $GITHUB_STEP_SUMMARY
              done
            fi
          fi

  publish:
    name: 📦 Publish nuget library
    runs-on: ubuntu-latest
    if: >
      startsWith(github.ref, 'refs/tags/')
      && (needs.check-nuget-changes.outputs.nuget_changed == 'true' || github.event.inputs.force_nuget_publish == 'true')
    needs: [build, check-nuget-changes]
    steps:
      - name: 👨‍💻 Check-out code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: 👨‍🔧 Setup .NET Core SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.x
            10.x

      - name: 🔍 Enable problem matchers
        run: echo "::add-matcher::.github/matchers/dotnet.json"

      - name: 🦸‍♂️ Restore steriods
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          # Look to see if there is a cache hit for the corresponding requirements file
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget

      - name: 🎒 Restore Tools
        run: dotnet tool restore

      - name: 🎒 Load packages
        run: dotnet restore

      - name: 🛠️ Build code
        shell: pwsh
        run: dotnet build --configuration Release -p:Version=$("${{ github.ref_name }}".Substring(1)) ./src/Sonos.Base.Events.Http/Sonos.Base.Events.Http.csproj

      - name: 📦 Pack Sonos.Base
        shell: pwsh
        run: dotnet pack --configuration Release --no-build -p:Version=$("${{ github.ref_name }}".Substring(1)) ./src/Sonos.Base/Sonos.Base.csproj

      - name: 📦 Pack Sonos.Base.Events.Http
        shell: pwsh
        run: dotnet pack --configuration Release --no-build -p:Version=$("${{ github.ref_name }}".Substring(1)) ./src/Sonos.Base.Events.Http/Sonos.Base.Events.Http.csproj

      - name: ✈️ Publish Sonos.Base to nuget.org
        run: dotnet nuget push ./src/Sonos.Base/bin/Release/Sonos.Base.*.nupkg -k $NUGET_AUTH_TOKEN -s https://api.nuget.org/v3/index.json
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.NUGET_TOKEN }}

      - name: ✈️ Publish Sonos.Base.Events.Http to nuget.org
        run: dotnet nuget push ./src/Sonos.Base.Events.Http/bin/Release/Sonos.Base.*.nupkg -k $NUGET_AUTH_TOKEN -s https://api.nuget.org/v3/index.json
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.NUGET_TOKEN }}

      - name: 📝 NuGet publish summary
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          echo "## 🚀 NuGet Packages Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Package | Version |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| [Sonos.Base](https://www.nuget.org/packages/Sonos.Base/${VERSION}) | \`${VERSION}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| [Sonos.Base.Events.Http](https://www.nuget.org/packages/Sonos.Base.Events.Http/${VERSION}) | \`${VERSION}\` |" >> $GITHUB_STEP_SUMMARY

  publish-docker:
    permissions:
      contents: read
      packages: write
    name: 🐳 Publish Docker image
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build]
    steps:
      - name: 👨‍💻 Check-out code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: 👨‍🔧 Setup .NET Core SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.x
            10.x

      - name: 🔍 Enable problem matchers
        run: echo "::add-matcher::.github/matchers/dotnet.json"

      - name: 🦸‍♂️ Restore steriods
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          # Look to see if there is a cache hit for the corresponding requirements file
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget

      - name: 🎒 Restore Tools
        run: dotnet tool restore

      - name: 🎒 Load packages for Sonos.Web
        run: dotnet restore ./src/Sonos.Web/Sonos.Web.csproj
        env:
          INCLUDE_API_DOCS: false

      - name: 🎒 Load packages for Sonos.Web.Blazor
        run: dotnet restore ./src/Sonos.Web.Blazor/Sonos.Web.Blazor.csproj

      - name: 🌐 Publish Blazor WASM to Sonos.Web wwwroot
        run: dotnet publish ./src/Sonos.Web.Blazor/Sonos.Web.Blazor.csproj --configuration Release -o ./src/Sonos.Web/wwwroot -p:StaticWebAssetProjectMode=Default

      - name: 🔑 Login to github container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 🐳 Publish to docker
        shell: pwsh
        run: |
          dotnet publish --os linux --arch amd64 --configuration Release -p:Version=$("${{ github.ref_name }}".Substring(1)) /t:PublishContainer ./src/Sonos.Web/Sonos.Web.csproj
        env:
          CONTAINER_IMAGE_TAGS: ${{ contains(github.ref_name, 'beta') && format('{0};beta', github.ref_name) || format('{0};latest', github.ref_name) }}
          INCLUDE_API_DOCS: false

      - name: 📝 Docker publish summary
        run: |
          VERSION="${{ github.ref_name }}"
          if [[ "$VERSION" == *"beta"* ]]; then
            TAGS="${VERSION};beta"
          else
            TAGS="${VERSION};latest"
          fi
          IMAGE="ghcr.io/${{ github.repository }}"
          echo "## 🐳 Docker Image Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "A new container image has been published to the GitHub Container Registry." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${IMAGE}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          IFS=';' read -ra TAG_LIST <<< "$TAGS"
          for tag in "${TAG_LIST[@]}"; do
            echo "- \`${IMAGE}:${tag}\`" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📦 [View on GitHub Packages](https://github.com/${{ github.repository }}/pkgs/container/${{ github.event.repository.name }})" >> $GITHUB_STEP_SUMMARY
